name: Run Business Podcast Summary

on:
  schedule:
    # 8:00 AM WIB = 01:00 UTC (founder reading time before standup)
    - cron: '0 1 * * *'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write  # needed to commit state.json back

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run summarizer
        env:
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python summarize.py

      - name: Commit state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update state.json [skip ci]"
            git push
          fi

