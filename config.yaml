settings:
  initial_lookback_days: 2
  min_duration_seconds: 600
  max_videos_per_run: 35
  claude_model: claude-sonnet-4-5
  supadata_lang: auto

# ============================================================
# CARA AMBIL CHANNEL ID YANG BENAR (deterministik, 100% akurat):
# 1. Buka channel YouTube di browser (cth: https://www.youtube.com/@LennysPodcast)
# 2. Klik kanan → View Page Source (Ctrl+U)
# 3. Ctrl+F → cari "channelId":"
# 4. Copy value-nya, format: UC + 22 karakter (total 24 char)
#
# Pastikan ambil MAIN channel, bukan "Clips" / "Highlights" / side channel.
# YouTube Music podcast channel (channel auto-generated dari Spotify/Apple RSS)
# TIDAK PUNYA RSS feed dan akan return 404.
# ============================================================

